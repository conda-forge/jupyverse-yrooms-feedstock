schema_version: 1

context:
  version: "0.1.2"

package:
  name: jupyverse-yrooms
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/j/jupyverse-yrooms/jupyverse_yrooms-${{ version }}.tar.gz
    sha256: 6be0402cbb34e7b285290519fab1639da635a87035de7f3c6f4b0a4d35039206

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - anyio
    - anyioutils
    - httpx
    - httpx-ws
    - jupyverse-api >=0.15.0,<0.16.0
    - pycrdt

tests:
  - python:
      imports: jupyverse_yrooms
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: BSD-3-Clause
  license_file: COPYING.md
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/api/yrooms
  summary: The API for Jupyverse's YRooms.

extra:
  recipe-maintainers:
    - davidbrochart
